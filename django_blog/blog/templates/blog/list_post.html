{% extends 'blog/base.html' %}
{% block content %}

<ul>
    <!-- Iterate over object_list -->
    {% for object in object_list %}
    <!-- Display Objects -->
    <li>{{ object.title }}</li>
    <!-- limit content to only 20 words to act as a snippet -->
    <li>{{ object.content|truncatechars:50 }}</li><a href="{% url 'detail_post' object.id %}">Read more</a></li>

    <hr/>
    <!-- If object_list is empty  -->
    {% empty %}
    <li>No objects yet.</li>
    {% endfor %}
</ul>
{% endblock %}
